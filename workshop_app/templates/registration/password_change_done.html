{% extends "workshop_app/base.html" %}

{% block title %} Password Changed {% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 200px);">
    <div class="card text-center" style="border-radius:20px; box-shadow:0 15px 35px rgba(0,0,0,0.1); padding:4rem 3rem; max-width:500px; width:100%; border:none; position:relative; overflow:hidden;">
        <div style="position:absolute; top:0; left:0; right:0; height:6px; background:linear-gradient(135deg, var(--success), #34d399);"></div>
        
        <div style="width:80px; height:80px; background:rgba(16, 185, 129, 0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem;">
            <span class="material-icons" style="font-size:40px; color:var(--success);">check_circle</span>
        </div>
        
        <h3 style="font-weight:800; font-size:1.8rem; color:var(--text-main); margin-bottom:1rem;">Password Changed Successfully!</h3>
        <p style="color:var(--text-muted); margin-bottom:2rem; line-height:1.6;">Your password has been securely updated. You will be redirected back to the dashboard momentarily.</p>
        
        <div class="d-flex justify-content-center">
            <div class="spinner-border" role="status" style="width: 2rem; height: 2rem; color:var(--primary); opacity:0.7;">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    window.setTimeout(function() {
        location.href="{% url 'workshop_app:index' %}"
    }, 2000);
</script>
{% endblock %}
